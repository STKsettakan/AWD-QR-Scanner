<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWDN Scan</title>
    <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --bg: #000;
        }
        body {
            font-family: sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        #preview-wrap {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            overflow: hidden;
            background: #222;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .scanner-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border: 2px solid #00ff00;
            border-radius: 8px;
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.7);
        }
        .ui-panel {
            width: 90%;
            max-width: 400px;
            padding: 20px 0;
            text-align: center;
        }
        .instructions {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        input[type=range] {
            width: 100%;
            margin: 15px 0;
            height: 25px;
        }
        button {
            width: 100%;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 123, 255, 0.4);
        }
        button:active {
            transform: scale(0.98);
        }
        #result-display {
            margin-top: 20px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            min-height: 50px;
            word-break: break-all;
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div style="padding: 15px; text-align: center;">
        <h2 style="margin:0; color:var(--primary);">AWDN Precision Scan</h2>
    </div>

    <div id="preview-wrap">
        <video id="v" autoplay playsinline muted></video>
        <div class="scanner-box"></div>
    </div>

    <div class="ui-panel">
        <p class="instructions">
            <b>เทคนิคแก้ภาพเบลอ:</b> ถอยมือถือห่างออกมา (30 ซม.) <br>
            แล้วใช้ "แถบซูม" ขยายให้ QR เข้ามาในกรอบเขียว
        </p>

        <div style="display: flex; align-items: center; gap: 10px;">
            <span>ซูม</span>
            <input type="range" id="zoom" min="1" max="1" step="0.1" value="1">
        </div>

        <button id="snap">CAPTURE & CONVERT</button>

        <div id="result-display">
            <div id="val" style="color:#0f0; font-family:monospace; font-size:18px;">--- รอสแกน ---</div>
            <div id="msg" style="font-size:12px; margin-top:8px; color:#888;"></div>
        </div>
    </div>

    <canvas id="c"></canvas>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const zoomInput = document.getElementById('zoom');
        const valBox = document.getElementById('val');
        const msgBox = document.getElementById('msg');
        const snapBtn = document.getElementById('snap');

        let track = null;

        // เริ่มกล้อง + ตั้งค่าซูมตาม capability ของกล้อง
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: 1920, height: 1080 }
        }).then(stream => {
            video.srcObject = stream;
            track = stream.getVideoTracks()[0];
            const caps = track.getCapabilities();
            if (caps.zoom) {
                zoomInput.min = caps.zoom.min;
                zoomInput.max = caps.zoom.max;
                zoomInput.step = caps.zoom.step;
                zoomInput.value = 1;
            }
        });

        zoomInput.oninput = () => {
            if (track) {
                track.applyConstraints({ advanced: [{ zoom: zoomInput.value }] });
            }
        };

        // แปลง IMEI (decimal) → AWDN_<HEX 6 bytes>
        function convertToAWDN(imei) {
            try {
                let n = BigInt(imei);
                let bytes = new Uint8Array(6);
                for (let i = 0; i < 6; i++) {
                    bytes[i] = Number((n >> BigInt((5 - i) * 8)) & 0xFFn);
                }
                return "AWDN_" + Array.from(bytes)
                    .map(x => x.toString(16).toUpperCase().padStart(2, '0'))
                    .join('');
            } catch (e) {
                return null;
            }
        }

        snapBtn.onclick = () => {
            valBox.innerText = "กำลังประมวลผล...";
            valBox.style.color = "#888";
            msgBox.innerText = "";

            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            // สแกนเฉพาะกรอบกลางภาพ (50% ของขนาดสั้นสุด)
            const scanSize = Math.min(canvas.width, canvas.height) * 0.5;
            const sx = (canvas.width - scanSize) / 2;
            const sy = (canvas.height - scanSize) / 2;

            const imgData = ctx.getImageData(sx, sy, scanSize, scanSize);
            const code = jsQR(imgData.data, imgData.width, imgData.height, {
                inversionAttempts: "dontInvert"
            });

            if (!code) {
                valBox.innerText = "--- สแกนไม่สำเร็จ ---";
                msgBox.innerText = "❌ ภาพยังไม่ชัด หรือ QR ไม่อยู่ในกรอบ\nลองถอยห่างอีกนิดแล้วใช้แถบซูมช่วย";
                return;
            }

            const match = code.data.match(/IMEI:(\d+);/);
            if (!match) {
                valBox.innerText = "--- ไม่พบ IMEI ---";
                msgBox.innerText = "🔍 พบ QR แต่ไม่มีข้อมูล IMEI ตามรูปแบบที่กำหนด";
                return;
            }

            const imei = match[1];
            const awdn = convertToAWDN(imei);
            valBox.innerText = awdn;
            valBox.style.color = "#0f0";
            navigator.clipboard.writeText(awdn);
            msgBox.innerText = "✅ คัดลอกแล้ว (IMEI: " + imei + ")";
        };
    </script>
</body>
</html>
