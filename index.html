<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AWDN Scan Pro</title>
    <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #000; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: white; margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        #preview-wrap {
            position: relative; width: 100%; max-width: 500px;
            aspect-ratio: 1/1; overflow: hidden; background: #111;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .scanner-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; border: 2px solid #00ff00;
            border-radius: 15px; box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6);
            pointer-events: none;
        }
        /* เส้นสแกนขยับได้ */
        .scanner-box::after {
            content: ""; position: absolute; width: 100%; height: 2px;
            background: rgba(0, 255, 0, 0.5); top: 0; left: 0;
            animation: scanLine 2.5s infinite ease-in-out;
        }
        @keyframes scanLine { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .ui-panel { width: 90%; max-width: 400px; padding: 20px 0; text-align: center; }
        .instructions { font-size: 13px; color: #888; margin-bottom: 15px; line-height: 1.4; }
        
        input[type=range] { width: 100%; height: 40px; accent-color: var(--primary); cursor: pointer; }
        
        button {
            width: 100%; padding: 20px; font-size: 20px; font-weight: bold;
            background: var(--primary); color: white; border: none;
            border-radius: 16px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.96); opacity: 0.8; }
        button:disabled { background: #333; cursor: not-allowed; }

        #result-display {
            margin-top: 20px; background: #151515; padding: 15px;
            border-radius: 12px; border: 1px solid #222; min-height: 80px;
        }
        #val { font-family: monospace; font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        #msg { font-size: 14px; color: #aaa; }
        #time-log { font-size: 11px; color: #555; margin-top: 8px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div style="padding: 20px 10px; text-align: center;">
        <h2 style="margin:0; color:var(--primary); letter-spacing: 1px;">AWDN PRECISION</h2>
    </div>

    <div id="preview-wrap">
        <video id="v" autoplay playsinline muted></video>
        <div class="scanner-box"></div>
    </div>

    <div class="ui-panel">
        <p class="instructions">
            <b>ทริค:</b> ถอยห่าง 30 ซม. แล้วใช้ <b>"แถบซูม"</b> ขยายจนภาพชัด<br>
            ระบบจะบันทึกลง Google Sheet อัตโนมัติเมื่อกดปุ่ม
        </p>

        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">
            <span style="font-size:12px; font-weight:bold;">ZOOM</span>
            <input type="range" id="zoom" min="1" max="5" step="0.1" value="1">
        </div>

        <button id="snap">CAPTURE & SAVE</button>

        <div id="result-display">
            <div id="val" style="color:#444;">---</div>
            <div id="msg">เตรียมพร้อมสแกน</div>
            <div id="time-log"></div>
        </div>
    </div>

    <canvas id="c"></canvas>

    <script>
        // *** วาง URL ของคุณที่นี่ ***
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbziGDKazd7VVy6W298uLd7pynqa_FGmqrC0fX-zaQR81Xfi7TC1SNR7mA_IWiCnlMaoJA/exec";

        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const zoomInput = document.getElementById('zoom');
        const valBox = document.getElementById('val');
        const msgBox = document.getElementById('msg');
        const timeLog = document.getElementById('time-log');
        const snapBtn = document.getElementById('snap');

        let track = null;

        // เริ่มต้นกล้อง
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                video.srcObject = stream;
                
                track = stream.getVideoTracks()[0];
                const caps = track.getCapabilities();
                if (caps.zoom) {
                    zoomInput.min = caps.zoom.min;
                    zoomInput.max = caps.zoom.max;
                    zoomInput.step = caps.zoom.step;
                }
            } catch (err) {
                msgBox.innerHTML = "<span style='color:red;'>❌ เข้าถึงกล้องไม่ได้: " + err.message + "</span>";
            }
        }

        zoomInput.oninput = () => {
            if (track && typeof track.applyConstraints === 'function') {
                track.applyConstraints({ advanced: [{ zoom: zoomInput.value }] });
            }
        };

        function convertToAWDN(imei) {
            try {
                let n = BigInt(imei);
                let bytes = new Uint8Array(6);
                for (let i = 0; i < 6; i++) {
                    bytes[i] = Number((n >> BigInt((5 - i) * 8)) & 0xFFn);
                }
                return "AWDN_" + Array.from(bytes).map(x => x.toString(16).toUpperCase().padStart(2, '0')).join('');
            } catch (e) { return null; }
        }

        snapBtn.onclick = async () => {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            // UI Feedback
            valBox.innerText = "WAIT...";
            valBox.style.color = "#888";
            snapBtn.disabled = true;

            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            // สแกนเฉพาะบริเวณกรอบเขียว (ตรงกลาง)
            const scanSize = Math.min(canvas.width, canvas.height) * 0.6;
            const sx = (canvas.width - scanSize) / 2;
            const sy = (canvas.height - scanSize) / 2;
            const imgData = ctx.getImageData(sx, sy, scanSize, scanSize);
            
            const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "dontInvert" });

            if (code && code.data.includes("IMEI:")) {
                const match = code.data.match(/IMEI:(\d+);/);
                if (match) {
                    const imei = match[1];
                    const awdn = convertToAWDN(imei);
                    
                    valBox.innerText = awdn;
                    valBox.style.color = "#0f0";
                    msgBox.innerText = "☁️ กำลังบันทึกลง Sheet...";

                    try {
                        // ส่งข้อมูลไปยัง Google Apps Script
                        await fetch(SCRIPT_URL, {
                            method: "POST",
                            mode: "no-cors",
                            body: JSON.stringify({ imei: imei, awdn: awdn })
                        });
                        
                        const now = new Date().toLocaleTimeString('th-TH');
                        msgBox.innerText = "✅ บันทึกสำเร็จ (IMEI: " + imei + ")";
                        timeLog.innerText = "บันทึกล่าสุด: " + now;
                        navigator.clipboard.writeText(awdn);
                    } catch (e) {
                        msgBox.innerHTML = "<span style='color:orange;'>⚠️ ส่งข้อมูลล้มเหลว แต่สแกนติด</span>";
                    }
                }
            } else {
                valBox.innerText = "NOT FOUND";
                valBox.style.color = "#ff4444";
                msgBox.innerText = "❌ ไม่พบ QR หรือภาพเบลอ ลองขยับ/ซูม";
            }
            
            snapBtn.disabled = false;
        };

        startCamera();
    </script>
</body>
</html>
