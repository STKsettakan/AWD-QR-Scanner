<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR IMEI Converter</title>
    <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --error-color: #dc3545;
            --bg-color: #121212;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        h2 { margin-bottom: 5px; color: var(--primary-color); }
        .description { font-size: 14px; color: #888; margin-bottom: 20px; }

        #video-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #333;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #scanner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .focus-box {
            width: 240px;
            height: 240px;
            border: 2px solid var(--primary-color);
            border-radius: 15px;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
        }

        .focus-box::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
            animation: scan 2s infinite linear;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .control-panel {
            width: 100%;
            max-width: 400px;
            margin-top: 25px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,123,255,0.3);
            transition: 0.2s;
        }

        button:active { transform: scale(0.98); background: #0056b3; }

        .result-container {
            margin-top: 25px;
            width: 100%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .result-label { font-size: 12px; color: #888; margin-bottom: 8px; }

        #client-id-box {
            width: 100%;
            background: #2d2d2d;
            border: 1px solid #444;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        #status-msg {
            margin-top: 10px;
            font-size: 14px;
            min-height: 20px;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <h2>AWDN Scanner</h2>
    <p class="description">Scan QR to Generate Client ID</p>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="scanner-overlay">
            <div class="focus-box"></div>
        </div>
    </div>

    <div class="control-panel">
        <button id="capture-btn">CAPTURE & CONVERT</button>
        
        <div class="result-container">
            <div class="result-label">GENERATED CLIENT ID (COPIED)</div>
            <input type="text" id="client-id-box" readonly placeholder="AWDN_XXXXXXXXXXXX">
            <div id="status-msg"></div>
        </div>
    </div>

    <canvas id="proc-canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('proc-canvas');
        const btn = document.getElementById('capture-btn');
        const clientIdBox = document.getElementById('client-id-box');
        const statusMsg = document.getElementById('status-msg');

        // 1. เริ่มทำงานของกล้อง
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                video.srcObject = stream;

                // พยายามตั้งค่า Auto Focus (สำหรับ Android Chrome)
                const track = stream.getVideoTracks()[0];
                if (track.getCapabilities().focusMode?.includes('continuous')) {
                    await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
                }
            } catch (err) {
                showStatus("❌ เข้าถึงกล้องไม่ได้: " + err.message, "error");
            }
        }

        // 2. ฟังก์ชันแปลงข้อมูลตาม Logic ภาษา C
        function createUniqueClientId(deviceId) {
            try {
                let number = BigInt(deviceId);
                let bytes = new Uint8Array(6);
                
                bytes[0] = Number((number >> 40n) & 0xFFn);
                bytes[1] = Number((number >> 32n) & 0xFFn);
                bytes[2] = Number((number >> 24n) & 0xFFn);
                bytes[3] = Number((number >> 16n) & 0xFFn);
                bytes[4] = Number((number >> 8n) & 0xFFn);
                bytes[5] = Number(number & 0xFFn);

                const hexString = Array.from(bytes)
                    .map(b => b.toString(16).toUpperCase().padStart(2, '0'))
                    .join('');
                
                return "AWDN_" + hexString;
            } catch (e) {
                return null;
            }
        }

        // 3. ฟังก์ชัน Copy อัตโนมัติ
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (err) {
                // Fallback สำหรับบาง Browser
                clientIdBox.select();
                document.execCommand('copy');
                return true;
            }
        }

        function showStatus(msg, type) {
            statusMsg.innerText = msg;
            statusMsg.style.color = type === "error" ? "var(--error-color)" : "var(--success-color)";
        }

        // 4. เมื่อกดปุ่ม Capture
        btn.addEventListener('click', () => {
            const context = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code) {
                // ดึง IMEI ออกจาก Text
                const imeiMatch = code.data.match(/IMEI:(\d+);/);
                
                if (imeiMatch && imeiMatch[1]) {
                    const imei = imeiMatch[1];
                    const finalId = createUniqueClientId(imei);
                    
                    if (finalId) {
                        clientIdBox.value = finalId;
                        copyToClipboard(finalId);
                        showStatus("✅ สแกนสำเร็จและคัดลอกแล้ว!", "success");
                    }
                } else {
                    showStatus("🔍 เจอ QR แต่ไม่พบข้อมูล IMEI", "error");
                    clientIdBox.value = "";
                }
            } else {
                showStatus("❌ ไม่พบ QR Code ในภาพ (ลองปรับระยะห่าง)", "error");
            }
        });

        // เริ่มรันกล้องเมื่อโหลดหน้าเว็บ
        initCamera();
    </script>
</body>
</html>
