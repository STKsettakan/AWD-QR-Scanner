<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AWDN Precision Scan</title>
    <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #0b0b0b; --card: #1e1e1e; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: white; margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        #preview-wrap {
            position: relative; width: 100%; max-width: 500px;
            aspect-ratio: 1/1; overflow: hidden; background: #000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .scanner-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 220px; border: 2px solid #00ff00;
            border-radius: 16px; box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6);
            pointer-events: none;
        }
        .scanner-box::after {
            content: ""; position: absolute; width: 100%; height: 2px;
            background: rgba(0, 255, 0, 0.6); top: 0; left: 0;
            animation: scan 2s infinite linear;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .ui-panel { width: 90%; max-width: 400px; padding: 20px 0; text-align: center; }
        .instructions { font-size: 13px; color: #888; margin-bottom: 15px; }
        
        input[type=range] { width: 100%; height: 35px; accent-color: var(--primary); margin: 10px 0; }
        
        button {
            width: 100%; padding: 18px; font-size: 18px; font-weight: bold;
            background: var(--primary); color: white; border: none;
            border-radius: 12px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.98); opacity: 0.9; }
        button:disabled { background: #444; color: #888; }

        #result-display {
            margin-top: 15px; background: var(--card); padding: 15px;
            border-radius: 12px; border: 1px solid #333; text-align: center;
        }
        #val { font-size: 24px; font-weight: bold; color: #00ff00; font-family: monospace; }
        #msg { font-size: 14px; margin-top: 5px; color: #aaa; }
        #time-log { font-size: 11px; color: #666; margin-top: 8px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div style="padding: 20px 10px;">
        <h2 style="margin:0; color:var(--primary); font-size: 22px;">AWDN Scanner</h2>
    </div>

    <div id="preview-wrap">
        <video id="v" autoplay playsinline muted></video>
        <div class="scanner-box"></div>
    </div>

    <div class="ui-panel">
        <p class="instructions">ถอยห่าง 30 ซม. แล้วใช้ <b>"แถบซูม"</b> ขยายภาพให้เข้ากรอบ</p>

        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
            <span style="font-size:12px; font-weight:bold;">ZOOM</span>
            <input type="range" id="zoom" min="1" max="1" step="0.1" value="1">
        </div>

        <button id="snap">สแกนและบันทึก</button>

        <div id="result-display">
            <div id="val">---</div>
            <div id="msg">พร้อมใช้งาน</div>
            <div id="time-log"></div>
        </div>
    </div>

    <canvas id="c"></canvas>

    <script>
        // 1. ใส่ URL ของ Apps Script ที่ได้จากการ Deploy (ต้องลงท้ายด้วย /exec)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbziGDKazd7VVy6W298uLd7pynqa_FGmqrC0fX-zaQR81Xfi7TC1SNR7mA_IWiCnlMaoJA/exec";

        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const zoomInput = document.getElementById('zoom');
        const valBox = document.getElementById('val');
        const msgBox = document.getElementById('msg');
        const timeLog = document.getElementById('time-log');
        const snapBtn = document.getElementById('snap');

        let track = null;

        // เริ่มกล้อง
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                
                track = stream.getVideoTracks()[0];
                const caps = track.getCapabilities ? track.getCapabilities() : {};
                if (caps.zoom) {
                    zoomInput.min = caps.zoom.min;
                    zoomInput.max = caps.zoom.max;
                    zoomInput.step = caps.zoom.step;
                    zoomInput.value = 1;
                }
            } catch (err) {
                msgBox.innerText = "❌ ไม่สามารถเข้าถึงกล้องได้: " + err.message;
            }
        }

        zoomInput.oninput = () => {
            if (track && track.applyConstraints) {
                track.applyConstraints({ advanced: [{ zoom: zoomInput.value }] });
            }
        };

        function convertToAWDN(imei) {
            try {
                let n = BigInt(imei);
                let bytes = new Uint8Array(6);
                for (let i = 0; i < 6; i++) {
                    bytes[i] = Number((n >> BigInt((5 - i) * 8)) & 0xFFn);
                }
                return "AWDN_" + Array.from(bytes).map(x => x.toString(16).toUpperCase().padStart(2, '0')).join('');
            } catch (e) { return null; }
        }

        snapBtn.onclick = async () => {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            valBox.innerText = "...";
            msgBox.innerText = "กำลังประมวลผล...";
            snapBtn.disabled = true;

            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            // สแกนเฉพาะบริเวณกรอบกลาง (60% ของพื้นที่)
            const scanSize = Math.min(canvas.width, canvas.height) * 0.6;
            const sx = (canvas.width - scanSize) / 2;
            const sy = (canvas.height - scanSize) / 2;
            const imgData = ctx.getImageData(sx, sy, scanSize, scanSize);
            
            const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "dontInvert" });

            if (code && code.data.includes("IMEI:")) {
                const match = code.data.match(/IMEI:(\d+);/);
                if (match) {
                    const imei = match[1];
                    const awdn = convertToAWDN(imei);
                    
                    valBox.innerText = awdn;
                    msgBox.innerText = "☁️ กำลังบันทึกลง Google Sheets...";

                    try {
                        // ส่งข้อมูลไปยัง Apps Script ด้วยรูปแบบ JSON
                        await fetch(SCRIPT_URL, {
                            method: "POST",
                            mode: "no-cors", // สำคัญมากสำหรับ Apps Script
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ imei: imei, awdn: awdn })
                        });
                        
                        msgBox.innerText = "✅ บันทึกสำเร็จ (IMEI: " + imei + ")";
                        timeLog.innerText = "บันทึกล่าสุด: " + new Date().toLocaleTimeString('th-TH');
                        navigator.clipboard.writeText(awdn);
                    } catch (e) {
                        msgBox.innerText = "⚠️ สแกนติด แต่บันทึกล้มเหลว: " + e.message;
                    }
                }
            } else {
                valBox.innerText = "---";
                msgBox.innerText = "❌ ไม่พบ QR หรือภาพไม่ชัด";
            }
            
            snapBtn.disabled = false;
        };

        initCamera();
    </script>
</body>
</html>
